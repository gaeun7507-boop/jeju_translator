<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주 사투리 번역기 · 돌하르방과 해녀</title>
<meta name="description" content="표준어 ↔ 제주 방언 번역기. 돌하르방이 제주말로 바꽈드립니다.">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 배경(노을 하늘·한라산·감귤나무·현무암 돌담)은 scene.js가 주입 -->
  <div id="scene" class="scene" aria-hidden="true"></div>

  <div class="app">

    <!-- ===== 랜딩 화면 ===== -->
    <section id="view-landing" class="view view-landing">
      <div class="hero-dol" id="heroDol" role="button" tabindex="0" aria-label="돌하르방 눌러서 번역 시작"></div>
      <div class="speech-bubble">
        <span class="speech-tail"></span>
        안녕하수꽈,<br>무신 거 궁금하우꽈?
      </div>
      <button class="start-btn" id="startBtn">
        번역 원하민 <b>이디</b> 눌릅서 →
      </button>
      <p class="start-sub">돌하르방을 눌러도 시작되우다</p>
    </section>

    <!-- ===== 번역 대화 화면 ===== -->
    <section id="view-chat" class="view view-chat hidden">
      <div class="card">
        <header class="card-head">
          <button class="back-btn" id="backBtn" title="처음으로" aria-label="처음으로">←</button>
          <div class="head-avatar" id="headAvatar"></div>
          <div class="head-text">
            <div class="head-title">돌하르방 사투리 번역기</div>
            <div class="head-sub" id="modeLabel">표준어 → 제주말</div>
          </div>
        </header>

        <!-- 모드 전환 -->
        <div class="mode-toggle" id="modeToggle">
          <button class="mode-btn active" data-mode="s2j">표준어 → 제주말</button>
          <button class="mode-btn" data-mode="j2s">제주말 → 표준어</button>
        </div>

        <div class="chat" id="chatLog" aria-live="polite"></div>

        <div class="composer">
          <textarea id="input" rows="1" placeholder="표준어를 입력하민 제주말로 바꽈드리쿠다…"></textarea>
          <button class="send" id="send" title="보내기" aria-label="보내기">➤</button>
        </div>
        <div class="hint" id="hint">Enter 보내기 · Shift+Enter 줄바꿈 · 뜻풀이는 참고용이우다 마씀</div>
      </div>
    </section>

  </div>

  <!-- 스크립트: 순서 중요 -->
  <script src="js/config.js"></script>
  <script src="js/dictionary.js"></script>
  <script src="js/translator.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
